# =============================================================================
# EduGrade Client — Nginx Configuration
# =============================================================================
# Serves the React production build and proxies /api requests to the backend.
# =============================================================================

server {
    listen       3000;
    server_name  localhost;

    # Gzip compression for faster loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml application/xml;
    gzip_min_length 256;

    # Root directory for static files
    root   /usr/share/nginx/html;
    index  index.html;

    # Serve static assets with long cache headers
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to the backend server
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for OCR/grading endpoints
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Increase body size for large uploads
        client_max_body_size 20m;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
